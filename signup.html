<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 회원가입</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>

<div class="auth-shell">

  <!-- LEFT: 브랜드 패널 -->
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="auth-brand">
        <div class="nav-icon" style="width:36px;height:36px;background:rgba(255,255,255,0.2);">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="white"/></svg>
        </div>
        <span class="auth-brand-name">SpendLetter</span>
      </a>

      <h1 class="auth-headline">내 소비가<br>뉴스가 된다</h1>
      <p class="auth-desc">소비 패턴을 분석해 나에게 꼭 맞는<br>뉴스레터를 매일 자동으로 추천해드려요</p>

      <div class="auth-features">
        <div class="auth-feature">
          <div class="auth-feature-icon">📊</div>
          <div class="auth-feature-text"><strong style="color:white;">소비 데이터 분석</strong><br>거래 내역을 AI가 자동으로 분석</div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">🗞️</div>
          <div class="auth-feature-text"><strong style="color:white;">맞춤 뉴스 추천</strong><br>TOP 3 카테고리 기반으로 매달 업데이트</div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">✉️</div>
          <div class="auth-feature-text"><strong style="color:white;">이메일 뉴스레터</strong><br>매일 아침 핵심 뉴스를 요약해서 전송</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT: 회원가입 폼 -->
  <div class="auth-right">
    <div class="auth-form-wrap">

      <div style="margin-bottom:32px;">
        <div class="section-badge" style="display:inline-block;margin-bottom:12px;">무료로 시작하기</div>
        <h2 class="auth-form-title">계정 만들기</h2>
        <p class="auth-form-sub">이미 계정이 있으신가요? <a href="login.html" style="color:var(--indigo-600);font-weight:600;text-decoration:none;">로그인하기 →</a></p>
      </div>

      <!-- 에러 메시지 -->
      <div id="globalError" style="display:none;background:#FEF2F2;border:1px solid #FEE2E2;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--error);font-weight:500;"></div>

      <form id="signupForm" novalidate>

        <!-- 이름 -->
        <div class="name-row">
          <div class="form-group">
            <label for="lastName">성</label>
            <div class="input-wrapper">
              <input type="text" id="lastName" placeholder="김" autocomplete="family-name">
            </div>
            <span class="error-msg" id="lastNameError"></span>
          </div>
          <div class="form-group">
            <label for="firstName">이름</label>
            <div class="input-wrapper">
              <input type="text" id="firstName" placeholder="철수" autocomplete="given-name">
            </div>
            <span class="error-msg" id="firstNameError"></span>
          </div>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="step-divider">
          <div class="step-divider-line"></div>
          <span class="step-divider-text">비밀번호 설정</span>
          <div class="step-divider-line"></div>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="영문 + 숫자 8자 이상" autocomplete="new-password">
            <button type="button" class="toggle-pw" id="togglePw">보기</button>
          </div>
          <div class="pw-strength" id="pwStrength" style="display:none;">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
            <span class="pw-strength-label" id="pwLabel"></span>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
          <label for="passwordConfirm">비밀번호 확인</label>
          <div class="input-wrapper">
            <input type="password" id="passwordConfirm" placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password">
            <button type="button" class="toggle-pw" id="togglePwConfirm">보기</button>
          </div>
          <span class="error-msg" id="passwordConfirmError"></span>
        </div>

        <div class="step-divider">
          <div class="step-divider-line"></div>
          <span class="step-divider-text">약관 동의</span>
          <div class="step-divider-line"></div>
        </div>

        <!-- 약관 -->
        <div class="terms-check">
          <input type="checkbox" id="agreeAll">
          <label for="agreeAll" style="font-weight:700;color:var(--gray-800);">전체 동의</label>
        </div>
        <div style="border-top:1px solid var(--gray-100);margin-bottom:12px;"></div>
        <div class="terms-check">
          <input type="checkbox" id="agreeService" class="term-item">
          <label for="agreeService">[필수] <button type="button" class="term-link" onclick="openTermModal('service')">서비스 이용약관</button>에 동의합니다</label>
        </div>
        <div class="terms-check">
          <input type="checkbox" id="agreePrivacy" class="term-item">
          <label for="agreePrivacy">[필수] <button type="button" class="term-link" onclick="openTermModal('privacy')">개인정보 처리방침</button>에 동의합니다</label>
        </div>
        <div class="terms-check" style="margin-bottom:24px;">
          <input type="checkbox" id="agreeMarketing" class="term-item">
          <label for="agreeMarketing">[선택] <button type="button" class="term-link" onclick="openTermModal('marketing')">마케팅 정보 수신</button>에 동의합니다</label>
        </div>
        <span class="error-msg" id="termsError" style="display:block;margin-top:-16px;margin-bottom:16px;"></span>

        <button type="submit" class="submit-btn">계정 만들기 →</button>
      </form>

      <p style="text-align:center;font-size:12px;color:var(--gray-400);margin-top:20px;line-height:1.6;">
        가입하면 SpendLetter의 서비스 이용약관 및<br>개인정보 처리방침에 동의한 것으로 간주합니다.
      </p>
    </div>
  </div>
</div>

<!-- ── 약관 모달 ── -->
<div class="modal-overlay" id="termModal" onclick="if(event.target===this)closeTermModal()">
  <div class="modal" style="max-width:560px;max-height:80vh;display:flex;flex-direction:column;">
    <div class="modal-header">
      <h2 class="modal-title" id="termModalTitle"></h2>
      <button class="modal-close" onclick="closeTermModal()">×</button>
    </div>
    <div id="termModalBody" style="overflow-y:auto;flex:1;font-size:14px;color:var(--gray-600);line-height:1.8;padding-right:4px;"></div>
    <div style="margin-top:24px;display:flex;gap:10px;">
      <button class="submit-btn" style="margin-top:0;" onclick="agreeAndClose()">동의하고 닫기</button>
      <button type="button" onclick="closeTermModal()" style="flex:0 0 auto;height:54px;padding:0 20px;background:white;color:var(--gray-600);border:1.5px solid var(--gray-200);border-radius:10px;font-family:var(--font);font-size:15px;font-weight:500;cursor:pointer;">닫기</button>
    </div>
  </div>
</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/signup.js"></script>
</body>
</html>
