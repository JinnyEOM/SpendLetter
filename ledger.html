<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 가계부</title>
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .cal-head-cell {
      padding: 10px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      text-align: center;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-100);
    }

    .cal-head-cell:first-child {
      color: var(--error);
    }

    .cal-head-cell:last-child {
      color: var(--indigo-500);
    }

    .cal-cell {
      vertical-align: top;
      padding: 12px 10px;
      border-right: 1px solid var(--gray-100);
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      min-height: 100px;
      width: calc(100% / 7);
      transition: background 0.15s;
    }

    .cal-cell:last-child {
      border-right: none;
    }

    .cal-cell:hover {
      background: var(--gray-50);
    }

    .cal-cell.selected {
      background: var(--indigo-50);
    }

    .cal-cell.today .cal-date {
      background: var(--indigo-600);
      color: white;
      border-radius: 50%;
    }

    .cal-cell.other-month .cal-date {
      color: var(--gray-300);
    }

    .cal-cell.sun .cal-date {
      color: var(--error);
    }

    .cal-cell.sat .cal-date {
      color: var(--indigo-500);
    }

    .cal-cell.today.sun .cal-date,
    .cal-cell.today.sat .cal-date {
      color: white;
    }

    .cal-date {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 4px;
    }

    .cal-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 2px;
    }

    .cal-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .cal-dot-income {
      background: #059669;
    }

    .cal-dot-expense {
      background: var(--error);
    }

    .cal-dot-more {
      font-size: 10px;
      color: var(--gray-400);
      line-height: 7px;
    }

    .detail-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-100);
    }

    .detail-item:last-of-type {
      border-bottom: none;
    }

    .detail-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-right: 10px;
    }

    .detail-left {
      display: flex;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .detail-desc {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-cat {
      font-size: 11px;
      color: var(--gray-400);
      margin-top: 2px;
    }

    .detail-amount {
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .detail-total {
      display: flex;
      justify-content: space-between;
      padding: 12px 0 0;
      margin-top: 4px;
      border-top: 1px solid var(--gray-200);
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-800);
    }
  </style>
</head>

<body>

  <div class="app-shell">
    <div id="app-nav"></div>

    <!-- MAIN -->
    <main class="app-main">
      <div class="page-header">
        <div>
          <h1>가계부</h1>
          <div class="page-header-sub">수입·지출 내역을 관리해요</div>
        </div>
        <div style="display:flex;gap:10px;">
          <button class="btn-sm btn-sm-ghost" onclick="openCSVModal()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <rect x="2" y="2" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.3" />
              <path d="M5 7h4M7 5v4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
            </svg>
            CSV 업로드
          </button>
          <button class="add-tx-btn" onclick="openAddModal()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 2v10M2 7h10" stroke="white" stroke-width="2" stroke-linecap="round" />
            </svg>
            내역 추가
          </button>
        </div>
      </div>

      <div class="page-body">

        <!-- 월별 요약 -->
        <div class="ledger-summary-bar" style="margin-bottom:24px;">
          <div class="stat-card">
            <div class="stat-card-label">이번달 수입</div>
            <div class="stat-card-value amount-income" id="totalIncome">₩0</div>
            <div class="stat-card-change" id="incomeCount">0건</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">이번달 지출</div>
            <div class="stat-card-value amount-expense" id="totalExpense">₩0</div>
            <div class="stat-card-change" id="expenseCount">0건</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">순수 잔액</div>
            <div class="stat-card-value" id="netBalance">₩0</div>
            <div class="stat-card-change" style="color:var(--gray-400);">수입 - 지출</div>
          </div>
        </div>

        <!-- 달력 -->
        <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px;">
          <div
            style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--gray-100);">
            <button onclick="changeMonth(-1)"
              style="width:32px;height:32px;border:1px solid var(--gray-200);border-radius:8px;background:white;cursor:pointer;font-size:16px;color:var(--gray-600);display:flex;align-items:center;justify-content:center;">‹</button>
            <span id="calMonthLabel"
              style="font-size:15px;font-weight:700;color:var(--gray-800);letter-spacing:-0.02em;"></span>
            <button onclick="changeMonth(1)"
              style="width:32px;height:32px;border:1px solid var(--gray-200);border-radius:8px;background:white;cursor:pointer;font-size:16px;color:var(--gray-600);display:flex;align-items:center;justify-content:center;">›</button>
          </div>
          <table id="calTable" style="width:100%;border-collapse:collapse;"></table>
        </div>
        
        <!-- 날짜 상세 -->
        <div class="card" id="detailPanel" style="padding:0;overflow:hidden;display:none;">
          <div
            style="padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;">
            <div style="font-size:15px;font-weight:700;color:var(--gray-800);" id="detailDateLabel"></div>
            <button onclick="closeDetail()"
              style="font-size:12px;color:var(--gray-400);background:none;border:none;cursor:pointer;font-family:var(--font);">닫기</button>
          </div>
          <div id="detailBody" style="padding:16px 24px;"></div>
        </div>

      </div>
    </main>
  </div>

  <!-- ADD MODAL -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">내역 추가</span>
        <button class="modal-close" onclick="closeModal('addModal')">✕</button>
      </div>

      <div class="app-form-group">
        <label>구분</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <label
            style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid var(--gray-200);border-radius:10px;cursor:pointer;transition:all 0.15s;"
            id="incomeLabel">
            <input type="radio" name="txType" value="income" id="typeIncome" style="accent-color:var(--indigo-600);">
            <span style="font-size:14px;font-weight:600;color:#059669;">+ 수입</span>
          </label>
          <label
            style="display:flex;align-items:center;gap:8px;padding:12px;border:2px solid var(--indigo-500);background:var(--indigo-50);border-radius:10px;cursor:pointer;transition:all 0.15s;"
            id="expenseLabel">
            <input type="radio" name="txType" value="expense" id="typeExpense" checked
              style="accent-color:var(--indigo-600);">
            <span style="font-size:14px;font-weight:600;color:var(--error);">- 지출</span>
          </label>
        </div>
      </div>

      <div class="app-form-group">
        <label>날짜</label>
        <input type="date" class="app-input" id="txDate">
      </div>
      <div class="app-form-group">
        <label>내용</label>
        <input type="text" class="app-input" id="txDesc" placeholder="ex. 스타벅스 아메리카노">
      </div>
      <div class="app-form-group">
        <label>금액 (원)</label>
        <input type="number" class="app-input" id="txAmount" placeholder="0" min="0">
      </div>
      <div class="app-form-group" style="margin-bottom:24px;">
        <label>카테고리</label>
        <select class="app-select" id="txCategory">
          <option value="식비">🍽️ 식비</option>
          <option value="교통">🚇 교통</option>
          <option value="쇼핑">🛍️ 쇼핑</option>
          <option value="문화">🎭 문화·여가</option>
          <option value="의료">🏥 의료·건강</option>
          <option value="통신">📱 통신</option>
          <option value="급여">💰 급여</option>
          <option value="기타">📦 기타</option>
        </select>
      </div>

      <div style="display:flex;gap:10px;">
        <button class="btn-sm btn-sm-ghost" style="flex:1;height:44px;font-size:14px;"
          onclick="closeModal('addModal')">취소</button>
        <button class="btn-sm btn-sm-primary" style="flex:2;height:44px;font-size:14px;"
          onclick="saveTransaction()">저장하기</button>
      </div>
    </div>
  </div>

  <!-- CSV MODAL -->
  <div class="modal-overlay" id="csvModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">CSV 파일 업로드</span>
        <button class="modal-close" onclick="closeModal('csvModal')">✕</button>
      </div>
      <label for="csvFileInput"
        style="border:2px dashed var(--gray-200);border-radius:14px;padding:40px 24px;text-align:center;margin-bottom:20px;cursor:pointer;transition:all 0.2s;display:block;"
        onmouseover="this.style.borderColor='var(--indigo-300)'" onmouseout="this.style.borderColor='var(--gray-200)'">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="margin:0 auto 14px;display:block;">
          <rect x="6" y="4" width="28" height="32" rx="6" stroke="#9CA3AF" stroke-width="2" />
          <path d="M14 20h12M20 14v12" stroke="#9CA3AF" stroke-width="2" stroke-linecap="round" />
        </svg>
        <div style="font-size:15px;font-weight:600;color:var(--gray-800);margin-bottom:6px;">여기에 CSV 파일을 드래그하거나 클릭해서 선택</div>
        <div style="font-size:13px;color:var(--gray-400);">국민은행, 신한은행, 하나은행 CSV 지원</div>
        <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="handleCSVUpload(this.files[0])">
      </label>
      <div
        style="background:var(--gray-50);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--gray-600);line-height:1.6;">
        <strong style="color:var(--gray-800);">지원 형식:</strong> 날짜, 내용, 금액, 잔액 순서의 CSV 파일<br>
        은행 앱 → 내보내기 → CSV로 내보내기
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn-sm btn-sm-ghost" style="flex:1;height:44px;" onclick="closeModal('csvModal')">취소</button>
        <button class="btn-sm btn-sm-primary" style="flex:2;height:44px;"onclick="document.getElementById('csvFileInput').click()">업로드</button>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/ledger.js"></script>
</body>

</html>
