<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 카테고리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="index.html" class="sidebar-brand">
      <div class="nav-icon" style="width:32px;height:32px;">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="white"/></svg>
      </div>
      <span class="sidebar-brand-name">SpendLetter</span>
    </a>
    <nav class="sidebar-nav">
      <a href="feed.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="2" fill="currentColor" opacity="0.3"/><rect x="10" y="2" width="6" height="6" rx="2" fill="currentColor"/><rect x="2" y="10" width="6" height="6" rx="2" fill="currentColor"/><rect x="10" y="10" width="6" height="6" rx="2" fill="currentColor" opacity="0.3"/></svg>
        마이 피드
      </a>
      <a href="ledger.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M5 7h8M5 10h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        가계부
      </a>
      <a href="analysis.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14l4-5 3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        소비 분석
      </a>
      <a href="category.html" class="active">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="5" cy="9" r="2" fill="currentColor"/><path d="M9 9h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="5" cy="5" r="2" fill="currentColor" opacity="0.4"/><path d="M9 5h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/><circle cx="5" cy="13" r="2" fill="currentColor" opacity="0.4"/><path d="M9 13h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/></svg>
        카테고리
      </a>
      <a href="mypage.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        마이 페이지
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-email" id="sidebarEmail">user@email.com</div>
          <div class="logout-btn" onclick="Storage.logout()">로그아웃</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-main">
    <div class="page-header">
      <div>
        <h1>카테고리 관리</h1>
        <div class="page-header-sub">내 뉴스 카테고리를 설정해요 (최대 3개)</div>
      </div>
      <button class="btn-sm btn-sm-primary" onclick="saveCategories()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        저장하기
      </button>
    </div>

    <div class="page-body">

      <!-- AI 추천 배너 -->
      <div style="background:linear-gradient(135deg,var(--indigo-600) 0%,#7C3AED 100%);border-radius:16px;padding:24px 28px;margin-bottom:28px;color:white;">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;">
          <div>
            <div style="font-size:11px;font-weight:600;opacity:0.7;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">✨ AI 분석 결과</div>
            <div style="font-size:16px;font-weight:700;margin-bottom:4px;">소비 패턴 기반 추천 카테고리</div>
            <div style="font-size:13px;opacity:0.75;">6월 소비 데이터 분석 완료 · 매달 1일 자동 업데이트</div>
          </div>
          <button onclick="applyAIRecommendation()" style="padding:10px 20px;background:rgba(255,255,255,0.2);border:1.5px solid rgba(255,255,255,0.3);border-radius:10px;font-size:13px;font-weight:600;color:white;cursor:pointer;backdrop-filter:blur(4px);font-family:var(--font);transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'">AI 추천 적용하기</button>
        </div>
        <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;">
          <div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 16px;backdrop-filter:blur(4px);">
            <div style="font-size:20px;margin-bottom:4px;">📈</div>
            <div style="font-size:12px;font-weight:700;">경제·금융</div>
            <div style="font-size:11px;opacity:0.7;">소비의 35% 연관</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 16px;backdrop-filter:blur(4px);">
            <div style="font-size:20px;margin-bottom:4px;">🍽️</div>
            <div style="font-size:12px;font-weight:700;">음식·요리</div>
            <div style="font-size:11px;opacity:0.7;">소비의 28% 연관</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:10px;padding:10px 16px;backdrop-filter:blur(4px);">
            <div style="font-size:20px;margin-bottom:4px;">💻</div>
            <div style="font-size:12px;font-weight:700;">IT·테크</div>
            <div style="font-size:11px;opacity:0.7;">소비의 22% 연관</div>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <!-- 현재 선택 -->
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;padding:0 4px;">
            현재 선택된 카테고리 <span id="selCount" style="color:var(--indigo-600);">0</span>/3
          </div>
          <div id="selectedList" style="display:flex;flex-direction:column;gap:10px;min-height:80px;">
            <!-- rendered by JS -->
          </div>
          <div id="emptySelected" style="display:none;padding:32px;text-align:center;border:2px dashed var(--gray-200);border-radius:14px;color:var(--gray-400);font-size:14px;">
            오른쪽에서 카테고리를 선택해주세요
          </div>
        </div>

        <!-- 전체 카테고리 -->
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--gray-400);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;padding:0 4px;">전체 카테고리</div>
          <div class="category-grid" id="allCategoryGrid" style="grid-template-columns:repeat(3,1fr);">
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Toast -->
<div id="toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-800);color:white;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;opacity:0;transition:all 0.3s;z-index:300;pointer-events:none;">저장됐어요 ✓</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/category.js"></script>
</body>
</html>
