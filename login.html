<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body class="login-page">

<div class="login-shell">

  <!-- 로고 헤더 -->
  <header class="login-header">
    <a href="index.html" class="login-logo-link">
      <div class="login-logo-icon">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
          <path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="white"/>
        </svg>
      </div>
      <span class="login-logo-name">SpendLetter</span>
    </a>
  </header>

  <!-- 폼 영역 -->
  <main class="login-main">
    <div class="login-card">

      <h1 class="login-title">로그인</h1>

      <!-- 에러 메시지 -->
      <div id="globalError" class="login-alert login-alert-error" style="display:none;"></div>
      <!-- 성공 메시지 -->
      <div id="globalSuccess" class="login-alert login-alert-success" style="display:none;"></div>

      <form id="loginForm" novalidate>

        <!-- 이메일 -->
        <div class="form-group">
          <label for="email">이메일</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group" style="margin-bottom:6px;">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
            <button type="button" class="toggle-pw" id="togglePw">보기</button>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <!-- 비밀번호 찾기 링크 -->
        <div style="text-align:right;margin-bottom:18px;">
          <a href="#" class="login-forgot">비밀번호를 잊으셨나요?</a>
        </div>

        <!-- 로그인 유지 체크박스 -->
        <label class="login-remember">
          <input type="checkbox" id="rememberMe">
          로그인 정보 기억하기
        </label>

        <!-- 로그인 버튼 -->
        <button type="submit" class="login-submit-btn">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="3" y="7" width="10" height="8" rx="2" stroke="white" stroke-width="1.5"/>
            <path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          로그인하기
        </button>

      </form>

      <!-- 구분선 -->
      <div class="login-divider"><span>또는</span></div>

      <!-- 구글 버튼 (준비 중) -->
      <button type="button" class="login-google-btn" onclick="alert('구글 로그인은 준비 중입니다.')">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 14.108 17.64 11.8 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        구글로 시작하기
        <span class="login-soon">(준비 중)</span>
      </button>

      <!-- 회원가입 링크 -->
      <p class="login-signup-link">
        아직 계정이 없으신가요? <a href="signup.html">가입하기 →</a>
      </p>

    </div>
  </main>

</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
