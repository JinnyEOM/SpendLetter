<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/pages/auth.css">
</head>
<body>

<div class="auth-shell">

  <!-- LEFT -->
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="auth-brand">
        <div class="nav-icon" style="width:36px;height:36px;background:rgba(255,255,255,0.2);">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="white"/></svg>
        </div>
        <span class="auth-brand-name">SpendLetter</span>
      </a>

      <h1 class="auth-headline">다시 돌아오셨군요!</h1>
      <p class="auth-desc">오늘도 나만의 맞춤 뉴스레터로<br>스마트하게 하루를 시작해요.</p>

      <div class="auth-features">
        <div class="auth-feature">
          <div class="auth-feature-icon">📊</div>
          <div class="auth-feature-text"><strong style="color:white;">소비 데이터 분석</strong><br>거래 내역을 AI가 자동으로 분석</div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">🗞️</div>
          <div class="auth-feature-text"><strong style="color:white;">맞춤 뉴스 추천</strong><br>TOP 3 카테고리 기반으로 매달 업데이트</div>
        </div>
        <div class="auth-feature">
          <div class="auth-feature-icon">✉️</div>
          <div class="auth-feature-text"><strong style="color:white;">이메일 뉴스레터</strong><br>매일 아침 핵심 뉴스를 요약해서 전송</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="auth-right">
    <div class="auth-form-wrap">

      <div style="margin-bottom:32px;">
        <div class="section-badge" style="display:inline-block;margin-bottom:12px;">로그인</div>
        <h2 class="auth-form-title">다시 오셨어요 👋</h2>
        <p class="auth-form-sub">계정이 없으신가요? <a href="signup.html" style="color:var(--indigo-600);font-weight:600;text-decoration:none;">무료로 시작하기 →</a></p>
      </div>

      <!-- 에러 메시지 -->
      <div id="globalError" style="display:none;background:#FEF2F2;border:1px solid #FEE2E2;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--error);font-weight:500;"></div>

      <!-- 성공 메시지 -->
      <div id="globalSuccess" style="display:none;background:#ECFDF5;border:1px solid #A7F3D0;border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#059669;font-weight:500;"></div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="email">이메일</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
          </div>
          <span class="error-msg" id="emailError"></span>
        </div>

        <div class="form-group" style="margin-bottom:8px;">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password">
            <button type="button" class="toggle-pw" id="togglePw">보기</button>
          </div>
          <span class="error-msg" id="passwordError"></span>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
          <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:13px;color:var(--gray-600);">
            <input type="checkbox" id="rememberMe" style="accent-color:var(--indigo-600);">
            로그인 유지
          </label>
          <a href="#" style="font-size:13px;color:var(--indigo-600);text-decoration:none;font-weight:600;">비밀번호 찾기</a>
        </div>

        <button type="submit" class="submit-btn">로그인</button>
      </form>

      <div style="display:flex;align-items:center;gap:12px;margin:24px 0;">
        <div style="flex:1;height:1px;background:var(--gray-200);"></div>
        <span style="font-size:12px;color:var(--gray-400);">또는</span>
        <div style="flex:1;height:1px;background:var(--gray-200);"></div>
      </div>

      <a href="signup.html" style="display:block;text-align:center;padding:14px;border:1.5px solid var(--gray-200);border-radius:10px;font-size:14px;font-weight:600;color:var(--gray-700);text-decoration:none;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--indigo-300)';this.style.color='var(--indigo-600)'" onmouseout="this.style.borderColor='var(--gray-200)';this.style.color='var(--gray-700)'">
        새 계정 만들기
      </a>

      <p style="text-align:center;font-size:12px;color:var(--gray-400);margin-top:24px;line-height:1.6;">
        SpendLetter의 <a href="#" style="color:var(--indigo-600);">이용약관</a> 및
        <a href="#" style="color:var(--indigo-600);">개인정보 처리방침</a>을 확인해주세요.
      </p>
    </div>
  </div>
</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/login.js"></script>
</body>
</html>
