<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 마이 피드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    .feed-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: stretch;
    }

    .feed-panel {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 600px;
    }
  
    .feed-panel-head {
      padding: 20px 24px;
      border-bottom: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
  
    .feed-panel-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-800);
      letter-spacing: -0.02em;
    }
  
    .feed-panel-sub {
      font-size: 12px;
      color: var(--gray-400);
      margin-top: 4px;
    }
  
    .cat-tabs {
      display: flex;
      padding: 0 24px;
      border-bottom: 1px solid var(--gray-100);
      overflow-x: auto;
      gap: 0;
      scrollbar-width: none;
    }

    .cat-tabs::-webkit-scrollbar {
      display: none;
    }
  
    .cat-tab {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-400);
      cursor: pointer;
      border: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      background: none;
      font-family: var(--font);
    }
  
    .cat-tab:hover {
      color: var(--gray-600);
    }
  
    .cat-tab.active {
      color: var(--indigo-600);
      border-bottom-color: var(--indigo-600);
    }
  
    .news-list {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
    }

    #mirrorBody {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #aiNewsList {
      flex: 1;
      overflow-y: auto;
    }
  
    .news-list-item {
      padding: 16px 24px;
      border-bottom: 1px solid var(--gray-100);
      cursor: pointer;
      transition: background 0.15s;
    }
  
    .news-list-item:last-child {
      border-bottom: none;
    }
  
    .news-list-item:hover {
      background: var(--gray-50);
    }
  
    .news-list-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
  
    .news-list-item h3 {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray-800);
      letter-spacing: -0.02em;
      line-height: 1.5;
      margin-bottom: 6px;
    }
  
    .news-list-item p {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.6;
      overflow: hidden;
      display: -webkit-box;
      -webkit-box-orient: vertical; /* stylelint-disable-line */
      -webkit-line-clamp: 2;
      line-clamp: 2;
    }
  
    .news-list-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }
  
    .save-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-400);
      font-size: 12px;
      font-family: var(--font);
      transition: color 0.15s;
      padding: 0;
    }
  
    .save-btn:hover {
      color: var(--error);
    }
  
    .mirror-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mirror-report-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--indigo-500);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .mirror-title {
      font-size: 16px;
      font-weight: 800;
      color: var(--gray-800);
      letter-spacing: -0.03em;
      line-height: 1.4;
    }

    .mirror-headline {
      font-size: 13px;
      color: var(--gray-400);
      line-height: 1.6;
      margin-top: 4px;
    }

    .mirror-content {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.8;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
    }

    .mirror-advice {
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
    }

    .mirror-advice-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 6px;
    }

    .mirror-advice p {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.7;
    }

    .mirror-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 12px;
      border-top: 1px solid var(--gray-100);
      font-size: 12px;
      color: var(--gray-400);
    }

    .mirror-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 24px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .mirror-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--indigo-100);
      border-top-color: var(--indigo-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  
    .synergy-bar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
  
    .synergy-label {
      font-size: 12px;
      color: var(--gray-600);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }
  
    .synergy-label strong {
      color: var(--indigo-600);
    }
  
    .synergy-track {
      flex: 1;
      max-width: 200px;
      height: 4px;
      background: var(--gray-100);
      border-radius: 100px;
      overflow: hidden;
    }
  
    .synergy-fill {
      height: 100%;
      background: var(--indigo-500);
      border-radius: 100px;
      transition: width 0.6s ease;
    }
  
    .synergy-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo-600);
      white-space: nowrap;
      flex-shrink: 0;
    }
  
    @media (max-width: 900px) {
      .feed-split {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="index.html" class="sidebar-brand">
      <div class="nav-icon" style="width:32px;height:32px;">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L12.5 7.5H18L13.5 11L15.5 17L10 13.5L4.5 17L6.5 11L2 7.5H7.5L10 2Z" fill="white"/></svg>
      </div>
      <span class="sidebar-brand-name">SpendLetter</span>
    </a>
    <nav class="sidebar-nav">
      <a href="feed.html" class="active">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="2" width="6" height="6" rx="2" fill="currentColor" opacity="0.3"/><rect x="10" y="2" width="6" height="6" rx="2" fill="currentColor"/><rect x="2" y="10" width="6" height="6" rx="2" fill="currentColor"/><rect x="10" y="10" width="6" height="6" rx="2" fill="currentColor" opacity="0.3"/></svg>
        마이 피드
      </a>
      <a href="ledger.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="12" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M5 7h8M5 10h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        가계부
      </a>
      <a href="analysis.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 14l4-5 3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        소비 분석
      </a>
      <a href="category.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="5" cy="9" r="2" fill="currentColor"/><path d="M9 9h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="5" cy="5" r="2" fill="currentColor" opacity="0.4"/><path d="M9 5h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/><circle cx="5" cy="13" r="2" fill="currentColor" opacity="0.4"/><path d="M9 13h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/></svg>
        카테고리
      </a>
      <a href="mypage.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 15c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        마이 페이지
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-email" id="sidebarEmail">user@email.com</div>
          <div class="logout-btn" onclick="Storage.logout()">로그아웃</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-main">

    <!-- 분석 정확도 바 -->
    <div class="synergy-bar">
      <span class="synergy-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline;vertical-align:-2px;margin-right:4px;"><path d="M7 1l1.7 3.5H13l-3.4 2.5 1.3 4L7 8.9 3.1 11l1.3-4L1 4.5h4.3L7 1z" fill="#4F46E5"/></svg>
        <strong>분석 정확도</strong>&nbsp;· 가계부 기록이 많을수록 더 정확해집니다
      </span>
      <div class="synergy-track">
        <div class="synergy-fill" id="synergyFill" style="width:10%"></div>
      </div>
      <span class="synergy-pct" id="synergyPct">0%</span>
    </div>

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div>
        <h1>마이 피드</h1>
        <div class="page-header-sub" id="feedDate">오늘의 맞춤 뉴스</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="chip chip-indigo">AI 요약</span>
        <button class="btn-sm btn-sm-ghost" onclick="refreshFeed()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 2l2-2v4H5l2-2z" fill="currentColor"/></svg>
          새로고침
        </button>
      </div>
    </div>

    <div class="page-body">

      <!-- 2분할 메인 영역 -->
      <div class="feed-split">

        <!-- ── 좌측: 맞춤 뉴스 ── -->
        <div class="feed-panel">
          <div class="feed-panel-head">
            <div>
              <div class="feed-panel-title">맞춤 뉴스</div>
              <div class="feed-panel-sub">선호 카테고리 기반 · 오늘의 뉴스</div>
            </div>
            <a href="category.html" style="font-size:13px;color:var(--indigo-600);font-weight:600;text-decoration:none;">카테고리 설정
              →</a>
          </div>

          <!-- 카테고리 탭 -->
          <div class="cat-tabs" id="catTabs"></div>

          <!-- 뉴스 리스트 -->
          <div class="news-list" id="newsList"></div>
        </div>

        <!-- ── 우측: 소비 분석 리포트 ── -->
        <div class="feed-panel">
          <div class="feed-panel-head">
            <div>
              <div class="feed-panel-title">AI 추천 뉴스</div>
              <div class="feed-panel-sub">소비 패턴 분석 기반 · AI 자동 추천</div>
            </div>
            <button class="btn-sm btn-sm-ghost" onclick="regenerateMirror()" id="mirrorRefreshBtn" style="font-size:13px;">
              다시 분석
            </button>
          </div>

          <!-- 거울 콘텐츠 -->
          <div id="mirrorBody">
            <div class="mirror-loading">
              <div class="mirror-spinner"></div>
              <span>소비 데이터를 분석하고 있어요...</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/feed.js"></script>
</body>
</html>
