<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 마이 피드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ── 섹션 헤더 ── */
    .section-head { margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--gray-800); letter-spacing: -0.02em; }
    .section-sub { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

    /* ── 3단 그리드 ── */
    .news-cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: stretch;
      gap: 20px;
    }

    .news-cards-grid > div { display: flex; }

    /* ── 카테고리 카드 ── */
    .news-card {
      background: white;
      border: 0.5px solid var(--gray-200);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .news-card-loading {
      min-height: 220px;
    }

    /* ── 카드 헤더 ── */
    .news-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--gray-100);
    }

    .news-card-cat {
      font-size: 18px;
      font-weight: 900;
      color: var(--gray-800);
      letter-spacing: -0.03em;
    }

    /* ── AI 뱃지 ── */
    .ai-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      background: var(--indigo-600);
      color: white;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── 랭킹 리스트 ── */
    .news-rank-list { flex: 1; }

    .news-rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      border-bottom: 1px solid var(--gray-50);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
    }

    .news-rank-item:last-child { border-bottom: none; }
    .news-rank-item:hover { background: var(--gray-50); }

    .news-rank-num {
      min-width: 22px;
      font-size: 17px;
      font-weight: 800;
      color: #534AB7;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .news-rank-content {
      flex: 1;
      min-width: 0;
    }

    .news-rank-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical; /* stylelint-disable-line */
      overflow: hidden;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .news-rank-time {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--gray-400);
      line-height: 1;
    }

    /* ── 썸네일 ── */
    .news-rank-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--gray-100);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .news-rank-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── 카드 푸터 ── */
    .news-card-foot {
      margin-top: auto;
      padding: 11px 20px;
      border-top: 1px solid var(--gray-100);
      text-align: center;
    }

    .expand-btn {
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--indigo-500);
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
      transition: color 0.15s;
      line-height: 1.4;
    }

    .expand-btn:hover { color: var(--indigo-700); }

    /* ── 빈 상태 / 로딩 ── */
    .news-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--gray-400);
      line-height: 1.7;
    }

    .mirror-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 20px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .mirror-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--indigo-100);
      border-top-color: var(--indigo-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 반응형 ── */
    @media (max-width: 960px) {
      .news-cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .news-cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-shell">
  <div id="app-nav"></div>

  <!-- MAIN -->
  <main class="app-main">

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div>
        <h1>마이 피드</h1>
        <div class="page-header-sub" id="feedDate">오늘의 맞춤 뉴스</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="chip chip-indigo">AI 요약</span>
        <button class="btn-sm btn-sm-ghost" onclick="refreshFeed()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 2l2-2v4H5l2-2z" fill="currentColor"/></svg>
          새로고침
        </button>
      </div>
    </div>

    <div class="page-body">

      <!-- ── 영역 1: 선호 카테고리 뉴스 ── -->
      <div style="margin-bottom:32px;">
        <div class="section-head">
          <div class="section-title">선호 카테고리 뉴스</div>
          <div class="section-sub">선택하신 주제의 새로운 소식들을 만나보세요</div>
        </div>
        <div class="news-cards-grid" id="userCatGrid"></div>
      </div>

      <!-- ── 구분선 ── -->
      <div style="height:1px;background:var(--gray-200);margin-bottom:32px;"></div>

      <!-- ── 영역 2: AI 추천 카테고리 뉴스 ── -->
      <div>
        <div class="section-head">
          <div class="section-title">소비 분석 기반 카테고리 뉴스</div>
          <div class="section-sub" id="aiSectionSub">최근 지출 기록을 바탕으로 추천드려요</div>
        </div>
        <div class="news-cards-grid" id="aiCatGrid"></div>
      </div>

    </div>
  </main>
</div>

  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pages/feed.js"></script>
</body>
</html>
