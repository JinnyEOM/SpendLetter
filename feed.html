<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendLetter — 마이 피드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    /* ── 섹션 헤더 ── */
    .section-head { margin-bottom: 20px; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--gray-800); letter-spacing: -0.02em; }
    .section-sub { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

    /* ── 3단 그리드 ── */
    .news-cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    /* ── 카테고리 카드 ── */
    .news-card {
      background: white;
      border: 0.5px solid var(--gray-200);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .news-card-loading {
      min-height: 220px;
    }

    /* ── 카드 헤더 ── */
    .news-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid var(--gray-100);
    }

    .news-card-cat {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-800);
      letter-spacing: -0.01em;
    }

    /* ── AI 뱃지 ── */
    .ai-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      background: var(--indigo-600);
      color: white;
      border-radius: 4px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── 랭킹 리스트 ── */
    .news-rank-list { flex: 1; }

    .news-rank-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      border-bottom: 1px solid var(--gray-50);
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
    }

    .news-rank-item:last-child { border-bottom: none; }
    .news-rank-item:hover { background: var(--gray-50); }

    .news-rank-num {
      width: 18px;
      font-size: 15px;
      text-align: center;
      flex-shrink: 0;
      line-height: 1;
    }

    .news-rank-content {
      flex: 1;
      min-width: 0;
    }

    .news-rank-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-800);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical; /* stylelint-disable-line */
      overflow: hidden;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .news-rank-time {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--gray-400);
      line-height: 1;
    }

    /* ── 카드 푸터 ── */
    .news-card-foot {
      padding: 11px 20px;
      border-top: 1px solid var(--gray-100);
      text-align: center;
    }

    .expand-btn {
      background: none;
      border: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--indigo-500);
      cursor: pointer;
      font-family: var(--font);
      padding: 0;
      transition: color 0.15s;
      line-height: 1.4;
    }

    .expand-btn:hover { color: var(--indigo-700); }

    /* ── 빈 상태 / 로딩 ── */
    .news-empty {
      padding: 40px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--gray-400);
      line-height: 1.7;
    }

    .mirror-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 48px 20px;
      color: var(--gray-400);
      font-size: 13px;
    }

    .mirror-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--indigo-100);
      border-top-color: var(--indigo-500);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 분석 정확도 바 ── */
    .synergy-bar {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .synergy-label {
      font-size: 12px;
      color: var(--gray-600);
      font-weight: 500;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .synergy-label strong { color: var(--indigo-600); }

    .synergy-track {
      flex: 1;
      max-width: 200px;
      height: 4px;
      background: var(--gray-100);
      border-radius: 100px;
      overflow: hidden;
    }

    .synergy-fill {
      height: 100%;
      background: var(--indigo-500);
      border-radius: 100px;
      transition: width 0.6s ease;
    }

    .synergy-pct {
      font-size: 12px;
      font-weight: 700;
      color: var(--indigo-600);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── 반응형 ── */
    @media (max-width: 960px) {
      .news-cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .news-cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- SIDEBAR -->

      </div>
      <span class="sidebar-brand-name">SpendLetter</span>

    <nav class="sidebar-nav">

      <a href="analysis.html">

      <a href="category.html">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="5" cy="9" r="2" fill="currentColor"/><path d="M9 9h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="5" cy="5" r="2" fill="currentColor" opacity="0.4"/><path d="M9 5h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/><circle cx="5" cy="13" r="2" fill="currentColor" opacity="0.4"/><path d="M9 13h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/></svg>

      </a>
      <a href="mypage.html">

    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-email" id="sidebarEmail">user@email.com</div>
          <div class="logout-btn" onclick="Storage.logout()">로그아웃</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="app-main">

    <!-- 분석 정확도 바 -->
    <div class="synergy-bar">
      <span class="synergy-label">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="display:inline;vertical-align:-2px;margin-right:4px;"><path d="M7 1l1.7 3.5H13l-3.4 2.5 1.3 4L7 8.9 3.1 11l1.3-4L1 4.5h4.3L7 1z" fill="#4F46E5"/></svg>
        <strong>분석 정확도</strong>&nbsp;· 가계부 기록이 많을수록 더 정확해집니다
      </span>
      <div class="synergy-track">
        <div class="synergy-fill" id="synergyFill" style="width:10%"></div>
      </div>
      <span class="synergy-pct" id="synergyPct">0%</span>
    </div>

    <!-- 페이지 헤더 -->
    <div class="page-header">
      <div>
        <h1>마이 피드</h1>
        <div class="page-header-sub" id="feedDate">오늘의 맞춤 뉴스</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="chip chip-indigo">AI 요약</span>
        <button class="btn-sm btn-sm-ghost" onclick="refreshFeed()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 2l2-2v4H5l2-2z" fill="currentColor"/></svg>
          새로고침
        </button>
      </div>
    </div>

    <div class="page-body">

      <!-- ── 영역 1: 선호 카테고리 뉴스 ── -->
      <div style="margin-bottom:32px;">
        <div class="section-head">
          <div class="section-title">선호 카테고리 뉴스</div>
          <div class="section-sub">내가 선택한 카테고리 기반</div>
        </div>
        <div class="news-cards-grid" id="userCatGrid"></div>
      </div>

      <!-- ── 구분선 ── -->
      <div style="height:1px;background:var(--gray-200);margin-bottom:32px;"></div>

      <!-- ── 영역 2: AI 추천 카테고리 뉴스 ── -->
      <div>
        <div class="section-head">
          <div class="section-title">AI 추천 카테고리 뉴스</div>
          <div class="section-sub" id="aiSectionSub">소비 분석 기반 · AI 자동 선정</div>
        </div>
        <div class="news-cards-grid" id="aiCatGrid"></div>
      </div>

    </div>
  </main>
</div>

  <script src="js/storage.js"></script>
  <script src="js/pages/feed.js"></script>
